<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Calorie Counter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .drag-over { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center justify-center p-6">

    <div id="auth-section" class="max-w-md w-full bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome Back</h1>
        <p class="text-sm text-gray-500 mb-6">Log in to access the AI Calorie Estimator.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username-input" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter username">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password-input" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter password">
            </div>
            
            <p id="auth-message" class="text-sm text-red-500 font-medium hidden"></p>

            <div class="flex gap-3 pt-2">
                <button id="login-btn" class="flex-1 bg-gray-900 text-white font-medium py-2 rounded-xl hover:bg-gray-800 transition">Log In</button>
                <button id="register-btn" class="flex-1 bg-white text-gray-900 border border-gray-300 font-medium py-2 rounded-xl hover:bg-gray-50 transition">Register</button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-xl w-full bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">AI Calorie Estimator</h1>
                <p id="user-greeting" class="text-sm text-gray-500 mt-1">Logged in as: </p>
            </div>
            <button id="logout-btn" class="text-sm text-red-500 hover:text-red-700 font-medium">Log Out</button>
        </div>
        
        <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-gray-400 transition flex flex-col items-center justify-center group">
            <span class="text-gray-400 group-hover:text-gray-600 mb-2 text-3xl">📸</span>
            <p class="text-sm font-medium text-gray-600">Drag & drop your food image here, or <span class="text-blue-600 underline">browse</span></p>
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <p id="file-name" class="text-xs text-gray-400 mt-2 hidden"></p>
        </div>

        <button id="upload-btn" class="w-full mt-4 bg-gray-900 text-white font-medium py-3 px-4 rounded-xl hover:bg-gray-800 transition disabled:opacity-50" disabled>
            Analyze Calories
        </button>

        <div class="mt-8">
            <label class="block text-sm font-medium text-gray-700 mb-2">Analysis Output</label>
            <pre id="output-box" class="w-full h-48 p-4 bg-gray-900 text-green-400 font-mono text-sm rounded-xl overflow-y-auto whitespace-pre-wrap">Awaiting image upload...</pre>
        </div>
    </div>

    <script>
        // === CONFIGURATION ===
        // PASTE YOUR ACTUAL RENDER URL HERE (No trailing slash)
        const BACKEND_URL = 'https://cal-calc-backend.onrender.com/analyze-food'; 
        // =====================

        // UI Elements
        const authSection = document.getElementById('auth-section');
        const appSection = document.getElementById('app-section');
        
        // Auth Elements
        const usernameInput = document.getElementById('username-input');
        const passwordInput = document.getElementById('password-input');
        const authMessage = document.getElementById('auth-message');
        const userGreeting = document.getElementById('user-greeting');
        
        // --- 1. INITIALIZATION (Check if already logged in) ---
        const savedUser = localStorage.getItem('calCalcUser');
        if (savedUser) {
            showApp(savedUser);
        }

        // --- 2. AUTHENTICATION LOGIC ---
        async function handleAuth(endpoint) {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!username || !password) {
                showAuthError("Please fill in both fields.");
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();

                if (data.error) {
                    showAuthError(data.error);
                } else {
                    if (endpoint === '/login') {
                        // Save digital badge to browser memory
                        localStorage.setItem('calCalcUser', username);
                        showApp(username);
                    } else {
                        // Registration success
                        authMessage.classList.remove('hidden', 'text-red-500');
                        authMessage.classList.add('text-green-500');
                        authMessage.textContent = "Account created! You can now log in.";
                    }
                }
            } catch (error) {
                showAuthError("Failed to connect to server.");
            }
        }

        document.getElementById('register-btn').addEventListener('click', () => handleAuth('/register'));
        document.getElementById('login-btn').addEventListener('click', () => handleAuth('/login'));
        
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('calCalcUser');
            usernameInput.value = '';
            passwordInput.value = '';
            authSection.classList.remove('hidden');
            appSection.classList.add('hidden');
        });

        // --- 3. UI HELPER FUNCTIONS ---
        function showAuthError(msg) {
            authMessage.classList.remove('hidden', 'text-green-500');
            authMessage.classList.add('text-red-500');
            authMessage.textContent = msg;
        }

        function showApp(username) {
            authSection.classList.add('hidden');
            appSection.classList.remove('hidden');
            userGreeting.textContent = `Logged in as: ${username}`;
        }

        // --- 4. CALCULATOR LOGIC (Unchanged) ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const fileNameDisplay = document.getElementById('file-name');
        const outputBox = document.getElementById('output-box');
        
        let selectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                selectedFile = file;
                fileNameDisplay.textContent = `Selected: ${file.name}`;
                fileNameDisplay.classList.remove('hidden');
                uploadBtn.disabled = false;
            } else {
                alert('Please select a valid image file.');
            }
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            outputBox.textContent = "Analyzing image with Gemini... Please wait.";
            uploadBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch(`${BACKEND_URL}/analyze-food`, { method: 'POST', body: formData });
                const data = await response.json();
                outputBox.textContent = JSON.stringify(data, null, 4);
            } catch (error) {
                outputBox.textContent = "Error sending data to server.";
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
