<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Calorie Counter</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style>
            .drag-over { border-color: #3b82f6; background-color: #eff6ff; }
        </style>
    </head>
    
    <body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-6">
        <div class="max-w-xl w-full bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h1 class="text-2xl font-bold text-gray-900 mb-2">AI Calorie Estimator</h1>
            <p class="text-sm text-gray-500 mb-6">Drop a food picture below to estimate nutritional content using Gemini.</p>
            
            <!-- Drag and Drop Zone / File Input -->
            <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-gray-400 transition flex flex-col items-center justify-center group">
                <span class="text-gray-400 group-hover:text-gray-600 mb-2 text-3xl">📸</span>
                <p class="text-sm font-medium text-gray-600">Drag & drop your food image here, or <span class="text-blue-600 underline">browse</span></p>
                <input type="file" id="file-input" accept="image/*" class="hidden">
                <p id="file-name" class="text-xs text-gray-400 mt-2 hidden"></p>
            </div>

            <!-- Action Button -->
            <button id="upload-btn" class="w-full mt-4 bg-gray-900 text-white font-medium py-3 px-4 rounded-xl hover:bg-gray-800 transition disabled:opacity-50" disabled>
                Analyze Calories
            </button>

            <!-- Output Text Area -->
            <div class="mt-8">
                <label class="block text-sm font-medium text-gray-700 mb-2">Analysis Output</label>
                <pre id="output-box" class="w-full h-48 p-4 bg-gray-900 text-green-400 font-mono text-sm rounded-xl overflow-y-auto whitespace-pre-wrap">Awaiting image upload...</pre>
            </div>
        </div>

        <script>
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            const uploadBtn = document.getElementById('upload-btn');
            const fileNameDisplay = document.getElementById('file-name');
            const outputBox = document.getElementById('output-box');
            
            let selectedFile = null;

            // Trigger file dialog when clicking the zone
            dropZone.addEventListener('click', () => fileInput.click());

            // Handle standard file selection
            fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

            // Drag and Drop event handlers
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
            });

            function handleFile(file) {
                if (file && file.type.startsWith('image/')) {
                    selectedFile = file;
                    fileNameDisplay.textContent = `Selected: ${file.name}`;
                    fileNameDisplay.classList.remove('hidden');
                    uploadBtn.disabled = false;
                } else {
                    alert('Please select a valid image file.');
                }
            }

            // Async network upload to FastAPI backend
            uploadBtn.addEventListener('click', async () => {
                if (!selectedFile) return;
                
                outputBox.textContent = "Analyzing image with Gemini... Please wait.";
                uploadBtn.disabled = true;

                const formData = new FormData();
                formData.append('file', selectedFile);

                try {
                    const response = await fetch('https://cal-calc-backend.onrender.com/analyze-food', { method: 'POST', body: formData });
                    const data = await response.json();
                    outputBox.textContent = JSON.stringify(data, null, 4);
                } catch (error) {
                    outputBox.textContent = "Error sending data to server.";
                } finally {
                    uploadBtn.disabled = false;
                }
            });
        </script>
    </body>
    </html>
